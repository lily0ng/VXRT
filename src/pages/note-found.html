
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
#stage {
  width: 100%;
  height: 520px;
  background: #0a0a0c;
  overflow: hidden;
  position: relative;
  font-family: 'Courier New', monospace;
}
canvas#bg { position: absolute; inset: 0; width: 100%; height: 100%; }
#scene {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column;
}

/* Hex logo */
#hex-wrap {
  position: relative;
  width: 160px; height: 160px;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 32px;
}
#hex-svg { width: 160px; height: 160px; overflow: visible; }

/* Rings */
.ring {
  position: absolute;
  border-radius: 50%;
  border: 0.5px solid rgba(192,57,43,0.18);
  animation: ringPulse 3s ease-in-out infinite;
}
#r1 { width: 200px; height: 200px; top: -20px; left: -20px; animation-delay: 0s; }
#r2 { width: 260px; height: 260px; top: -50px; left: -50px; animation-delay: 0.6s; }
#r3 { width: 320px; height: 320px; top: -80px; left: -80px; animation-delay: 1.2s; }

@keyframes ringPulse {
  0%,100% { opacity: 0.15; transform: scale(1); }
  50%      { opacity: 0.45; transform: scale(1.03); }
}

/* scan line */
#scan {
  position: absolute;
  left: -80px; right: -80px; height: 1px;
  background: rgba(192,57,43,0.5);
  top: 80px;
  animation: scanLine 2.4s ease-in-out infinite;
}
@keyframes scanLine {
  0%   { top: -80px; opacity: 0; }
  10%  { opacity: 1; }
  90%  { opacity: 1; }
  100% { top: 240px; opacity: 0; }
}

/* wordmark */
#wordmark {
  text-align: center;
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 0.8s ease, transform 0.8s ease;
}
#wordmark.show { opacity: 1; transform: translateY(0); }
#vxrt-text {
  font-size: 52px;
  font-weight: 700;
  letter-spacing: 0.18em;
  color: #e8e8ea;
  line-height: 1;
  text-shadow: none;
}
#vxrt-text .v { color: #e8e8ea; }
#vxrt-text .x { color: #c0392b; }
#vxrt-text .r { color: #e8e8ea; }
#vxrt-text .t { color: #e8e8ea; }
#sub-text {
  font-size: 11px;
  letter-spacing: 0.32em;
  color: #c0392b;
  margin-top: 6px;
}
#tagline {
  font-size: 12px;
  letter-spacing: 0.12em;
  color: #4a4a52;
  margin-top: 18px;
  opacity: 0;
  transition: opacity 1s ease 0.4s;
}
#tagline.show { opacity: 1; }

/* data readout strip */
#data-strip {
  position: absolute;
  bottom: 24px; left: 0; right: 0;
  display: flex; justify-content: center; gap: 40px;
  opacity: 0;
  transition: opacity 0.8s ease;
}
#data-strip.show { opacity: 1; }
.ds-item { text-align: center; }
.ds-val { font-size: 13px; color: #c0392b; letter-spacing: 0.1em; }
.ds-lbl { font-size: 9px; color: #3a3a42; letter-spacing: 0.18em; margin-top: 3px; }

/* corner brackets */
.corner {
  position: absolute;
  width: 20px; height: 20px;
  border-color: rgba(192,57,43,0.4);
  border-style: solid;
  opacity: 0;
  transition: opacity 0.6s ease;
}
.corner.show { opacity: 1; }
#c-tl { top: 16px; left: 16px; border-width: 1px 0 0 1px; }
#c-tr { top: 16px; right: 16px; border-width: 1px 1px 0 0; }
#c-bl { bottom: 16px; left: 16px; border-width: 0 0 1px 1px; }
#c-br { bottom: 16px; right: 16px; border-width: 0 1px 1px 0; }

/* replay */
#replay {
  position: absolute; bottom: 12px; right: 16px;
  font-size: 9px; letter-spacing: 0.14em; color: #3a3a42;
  cursor: pointer; border: 0.5px solid #2a2a2e;
  padding: 4px 10px; border-radius: 4px;
  transition: color 0.2s, border-color 0.2s;
}
#replay:hover { color: #c0392b; border-color: #c0392b; }

/* hex path animation */
.hex-path {
  stroke-dasharray: 400;
  stroke-dashoffset: 400;
  animation: drawHex 1.2s ease forwards;
}
.hex-inner {
  stroke-dasharray: 260;
  stroke-dashoffset: 260;
  animation: drawHex 1s ease 0.4s forwards;
}
.cross-line {
  stroke-dasharray: 200;
  stroke-dashoffset: 200;
  animation: drawHex 0.8s ease 0.8s forwards;
}
.dot-anim {
  r: 0;
  animation: dotGrow 0.5s ease 1.2s forwards;
}
@keyframes drawHex {
  to { stroke-dashoffset: 0; }
}
@keyframes dotGrow {
  to { r: 8; }
}

/* particle canvas */
#particles { position: absolute; inset: 0; pointer-events: none; }
</style>

<div id="stage">
  <canvas id="bg"></canvas>
  <canvas id="particles"></canvas>

  <div class="corner" id="c-tl"></div>
  <div class="corner" id="c-tr"></div>
  <div class="corner" id="c-bl"></div>
  <div class="corner" id="c-br"></div>

  <div id="scene">
    <div id="hex-wrap">
      <div class="ring" id="r1"></div>
      <div class="ring" id="r2"></div>
      <div class="ring" id="r3"></div>
      <div id="scan"></div>

      <svg id="hex-svg" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <polygon class="hex-path"
          points="50,6 88,28 88,72 50,94 12,72 12,28"
          fill="#0d0d10" stroke="#c0392b" stroke-width="1.5" stroke-linejoin="round"/>
        <polygon class="hex-inner"
          points="50,18 76,33 76,67 50,82 24,67 24,33"
          fill="none" stroke="#2a2a32" stroke-width="0.8" stroke-linejoin="round"/>
        <line class="cross-line" x1="50" y1="6"  x2="50" y2="94" stroke="#c0392b" stroke-width="0.6" opacity="0.4"/>
        <line class="cross-line" x1="12" y1="28" x2="88" y2="72" stroke="#c0392b" stroke-width="0.6" opacity="0.4"/>
        <line class="cross-line" x1="88" y1="28" x2="12" y2="72" stroke="#c0392b" stroke-width="0.6" opacity="0.4"/>
        <circle class="dot-anim" cx="50" cy="50" r="0" fill="#c0392b"/>
        <circle cx="50" cy="50" r="3" fill="#0a0a0c" opacity="0" id="dot-inner"/>
      </svg>
    </div>

    <div id="wordmark">
      <div id="vxrt-text">
        <span class="v">V</span><span class="x">X</span><span class="r">R</span><span class="t">T</span>
      </div>
      <div id="sub-text">OFFENSIVE SECURITY</div>
    </div>
    <div id="tagline">WE BREAK IN. SO THEY CAN'T.</div>
  </div>

  <div id="data-strip">
    <div class="ds-item"><div class="ds-val" id="d1">---</div><div class="ds-lbl">STATUS</div></div>
    <div class="ds-item"><div class="ds-val" id="d2">---</div><div class="ds-lbl">MODE</div></div>
    <div class="ds-item"><div class="ds-val" id="d3">---</div><div class="ds-lbl">TARGET</div></div>
    <div class="ds-item"><div class="ds-val" id="d4">---</div><div class="ds-lbl">UPTIME</div></div>
  </div>

  <div id="replay">REPLAY</div>
</div>

<script>
(function(){
  const stage = document.getElementById('stage');
  const bgCanvas = document.getElementById('bg');
  const pCanvas = document.getElementById('particles');

  function resize() {
    bgCanvas.width = stage.offsetWidth;
    bgCanvas.height = stage.offsetHeight;
    pCanvas.width = stage.offsetWidth;
    pCanvas.height = stage.offsetHeight;
    drawGrid();
  }

  function drawGrid() {
    const ctx = bgCanvas.getContext('2d');
    const W = bgCanvas.width, H = bgCanvas.height;
    ctx.clearRect(0,0,W,H);
    ctx.strokeStyle = 'rgba(30,30,34,0.8)';
    ctx.lineWidth = 0.5;
    const gs = 40;
    for(let x=0; x<W; x+=gs){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
    for(let y=0; y<H; y+=gs){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
  }

  resize();
  window.addEventListener('resize', resize);

  const particles = [];
  for(let i=0; i<38; i++){
    particles.push({
      x: Math.random() * 700,
      y: Math.random() * 520,
      vx: (Math.random()-0.5)*0.4,
      vy: (Math.random()-0.5)*0.4,
      r: Math.random()*1.5+0.3,
      a: Math.random()*0.5+0.1,
      red: Math.random() > 0.75
    });
  }

  function animParticles() {
    const ctx = pCanvas.getContext('2d');
    const W = pCanvas.width, H = pCanvas.height;
    ctx.clearRect(0,0,W,H);
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      if(p.x<0) p.x=W; if(p.x>W) p.x=0;
      if(p.y<0) p.y=H; if(p.y>H) p.y=0;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fillStyle = p.red ? `rgba(192,57,43,${p.a})` : `rgba(100,100,110,${p.a*0.5})`;
      ctx.fill();
    });
    requestAnimationFrame(animParticles);
  }
  animParticles();

  function runIntro() {
    document.getElementById('wordmark').classList.remove('show');
    document.getElementById('tagline').classList.remove('show');
    document.getElementById('data-strip').classList.remove('show');
    ['c-tl','c-tr','c-bl','c-br'].forEach(id => document.getElementById(id).classList.remove('show'));
    document.getElementById('d1').textContent='---';
    document.getElementById('d2').textContent='---';
    document.getElementById('d3').textContent='---';
    document.getElementById('d4').textContent='---';

    const hexPaths = document.querySelectorAll('.hex-path, .hex-inner, .cross-line');
    const dotAnim = document.querySelector('.dot-anim');
    hexPaths.forEach(el => {
      const clone = el.cloneNode(true);
      el.parentNode.replaceChild(clone, el);
    });
    const dotClone = dotAnim.cloneNode(true);
    dotAnim.parentNode.replaceChild(dotClone, dotAnim);

    setTimeout(() => {
      ['c-tl','c-tr','c-bl','c-br'].forEach(id => document.getElementById(id).classList.add('show'));
    }, 600);

    setTimeout(() => {
      document.getElementById('wordmark').classList.add('show');
    }, 1400);

    setTimeout(() => {
      document.getElementById('tagline').classList.add('show');
    }, 2000);

    const dataSeq = [
      { id:'d1', val:'ONLINE' },
      { id:'d2', val:'REDOPS' },
      { id:'d3', val:'GLOBAL' },
      { id:'d4', val:'99.9%' },
    ];
    dataSeq.forEach((item, i) => {
      setTimeout(() => {
        const el = document.getElementById(item.id);
        let chars = '0123456789ABCDEF#@!%';
        let count = 0;
        const scramble = setInterval(() => {
          el.textContent = Array.from({length: item.val.length}, () =>
            chars[Math.floor(Math.random()*chars.length)]).join('');
          count++;
          if(count > 8) { clearInterval(scramble); el.textContent = item.val; }
        }, 50);
      }, 1800 + i * 200);
    });

    setTimeout(() => {
      document.getElementById('data-strip').classList.add('show');
    }, 1800);

    setTimeout(() => {
      document.getElementById('dot-inner').style.opacity = '1';
    }, 1300);
  }

  runIntro();
  document.getElementById('replay').addEventListener('click', runIntro);
})();
</script>
